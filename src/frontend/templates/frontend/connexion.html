{% extends 'frontend/base.html' %}

{% block title %}Connexion{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="card-title text-center mb-4">
          <i class="bi bi-box-arrow-in-right text-primary"></i> Connexion
        </h2>

        {% if form.non_field_errors %}
          <div class="alert alert-danger">
            {{ form.non_field_errors }}
          </div>
        {% endif %}

        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label for="id_username" class="form-label">Nom d'utilisateur</label>
            <input type="text" name="username" id="id_username" class="form-control" required autofocus>
          </div>
          <div class="mb-3">
            <label for="id_password" class="form-label">Mot de passe</label>
            <input type="password" name="password" id="id_password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right"></i> Se connecter
          </button>
        </form>

        <p class="text-center mt-3 mb-0 text-muted">
          Pas encore de compte ?
          <a href="{% url 'frontend:inscription' %}">Créer un compte étudiant</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
